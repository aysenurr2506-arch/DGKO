<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ffe3e3; /* Yumuşak pembe arka plan */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Uçuşan Kalpler Animasyonu */
        .heart-bg {
            position: absolute;
            color: #ffb7b7;
            font-size: 20px;
            animation: fly 5s linear infinite;
            z-index: 0;
        }

        @keyframes fly {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Zarf Konteynırı */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            z-index: 10;
            transition: 0.5s;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: #f08080; /* Koyu pembe/kırmızı zarf */
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Zarfın Kapağı */
        .envelope:before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 2;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #f08080;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        /* Zarfın İç Kısmı */
        .envelope:after {
            content: "";
            position: absolute;
            z-index: 1;
            width: 300px;
            height: 200px;
            background: #e57373;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid transparent;
            border-bottom: 100px solid #f08080;
            box-sizing: border-box;
        }

        /* Mektup Kağıdı */
        .letter {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            z-index: 1;
            transition: 0.5s;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            border-radius: 5px;
            overflow: hidden;
        }

        .letter h2 {
            font-family: 'Dancing Script', cursive;
            color: #d32f2f;
            margin-top: 0;
        }

        .letter p {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
        }

        /* Zarf Açıldığında Olacaklar */
        .envelope-wrapper.open .envelope:before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            bottom: 100px;
            height: 350px; /* Mektup dışarı uzuyor */
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-y: auto; /* Yazı uzunsa kaydırılabilir */
        }

        /* Tıkla Mesajı */
        .instruction {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #d32f2f;
            font-weight: bold;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(10px); } }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="envelope">
            <div class="letter">
                <h2>Canım Sevgilim,</h2>
                <p>Bugün senin günün... Yanında olduğum her an için şükrediyorum. Senin gülüşün benim dünyamı aydınlatıyor.</p>
                <p>İyi ki doğdun, iyi ki benimlesin. Gelecekteki tüm yaşlarını birlikte kutlamak dileğiyle...</p>
                <p>Seni dünyalar kadar çok seviyorum! ❤️</p>
                <p style="font-family: 'Dancing Script'; font-size: 20px;">- Aşko Babysi </p>
            </div>
        </div>
        <div class="instruction">Mektubu açmak için tıkla ❤️</div>
    </div>

    <script>
        // Arka planda uçuşan kalpler oluşturma
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
